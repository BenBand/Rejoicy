<!DOCTYPE html>
<html lang="en-ZM">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Rejoicy Counselling</title>
    <link rel="stylesheet" href="main.css">
    <script defer src="script.js"></script>
</head>
<body>
    <form method="post" onsubmit="return registerUser(event)">
        <div class="register-form">
            <h3>Create Account</h3>
            <input type="text" class="input-register" id="fname" placeholder="Type your first name" required>

            <input type="text" class="input-register" id="lname" placeholder="Type your last name" required>
            
            <input type="email" class="input-register" id="email" placeholder="Type your email" required>

            <input type="password" class="input-register" id="password" placeholder="Type your password" required minlength="6">
            <input type="password" class="input-register" id="password2" placeholder="Confirm your password" required>

            <p id="register-error" class="error-message"></p>

            <p> Already have an account? <a href="/login">Login</a></p>

            <input type="submit" class="btn-create" value="Create">
        </div>
    </form>

    <script>
        async function registerUser(event) {
            event.preventDefault();
            
            const firstName = document.getElementById("fname").value;
            const lastName = document.getElementById("lname").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const password2 = document.getElementById("password2").value;
            const errorMsg = document.getElementById("register-error");

            // Reset error
            errorMsg.textContent = "";
            errorMsg.style.textAlign = "center";

            // Validation
            if (!firstName || !lastName || !email || !password || !password2) {
                errorMsg.textContent = "Please fill in all fields";
                return false;
            }

            if (password !== password2) {
                errorMsg.textContent = "Passwords do not match";
                return false;
            }

            if (password.length < 6) {
                errorMsg.textContent = "Password must be at least 6 characters";
                return false;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = '/login';
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorMsg.textContent = 'Server error. Please try again.';
            }

            return false;
        }
    </script>
</body>
</html>
